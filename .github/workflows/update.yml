name: Mise a jour hebdomadaire AirDakar

on:
  schedule:
    # Chaque lundi a 06h00 UTC
    - cron: '0 6 * * 1'
  # Permet aussi de lancer manuellement depuis l'interface GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installer les dependances systeme pour GeoPandas
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgdal-dev

      - name: Generer le dashboard
        run: python main.py

      - name: Publier index.html sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: index.html
